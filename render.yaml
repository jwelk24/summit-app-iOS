services:
  - type: web
    name: summit-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: PLAID_PRODUCTS
        value: transactions,investments,liabilities
      - key: PLAID_COUNTRY_CODES
        value: US
      - key: PLAID_LANGUAGE
        value: en
      - key: PLAID_REDIRECT_URI
        value: https://summit.local/plaid-redirect
